name: Build & Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # GCC 13
          - { os: ubuntu-24.04, cc: gcc-13, cxx: g++-13, build_type: Debug }
          - { os: ubuntu-24.04, cc: gcc-13, cxx: g++-13, build_type: Release }
          # GCC 14
          - { os: ubuntu-24.04, cc: gcc-14, cxx: g++-14, build_type: Debug }
          - { os: ubuntu-24.04, cc: gcc-14, cxx: g++-14, build_type: Release }
          # Clang 17
          - { os: ubuntu-24.04, cc: clang-17, cxx: clang++-17, build_type: Debug }
          - { os: ubuntu-24.04, cc: clang-17, cxx: clang++-17, build_type: Release }
          # Clang 18
          - { os: ubuntu-24.04, cc: clang-18, cxx: clang++-18, build_type: Debug }
          - { os: ubuntu-24.04, cc: clang-18, cxx: clang++-18, build_type: Release }
          # MSVC
          - { os: windows-latest, cc: cl, cxx: cl, build_type: Debug }
          - { os: windows-latest, cc: cl, cxx: cl, build_type: Release }

    runs-on: ${{ matrix.os }}
    name: "${{ matrix.cc }} / ${{ matrix.build_type }}"

    steps:
      - uses: actions/checkout@v4

      - name: Configure (Unix)
        if: runner.os != 'Windows'
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DBUILD_TESTING=ON
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}

      - name: Configure (MSVC)
        if: runner.os == 'Windows'
        run: cmake -B build -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }}

      - name: Test
        run: ctest --test-dir build --build-config ${{ matrix.build_type }} --output-on-failure
