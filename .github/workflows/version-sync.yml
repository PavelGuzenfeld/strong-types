name: Version Sync

on:
  release:
    types: [published]

permissions: {}

jobs:
  sync:
    permissions:
      contents: write
    uses: PavelGuzenfeld/standard/.github/workflows/version-sync.yml@main
    with:
      tag: ${{ github.event.release.tag_name }}
      enable_cmake: true
      enable_readme_fetchcontent: true
      enable_package_xml: true
