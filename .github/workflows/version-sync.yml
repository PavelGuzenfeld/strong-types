name: Version Sync

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  sync:
    uses: PavelGuzenfeld/standard/.github/workflows/version-sync.yml@main
    with:
      tag: ${{ github.event.release.tag_name }}
      enable_cmake: true
      enable_readme_fetchcontent: true
      enable_package_xml: true
