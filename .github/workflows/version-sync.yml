name: Version Sync

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main

      - name: Update version files
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VER="${TAG#v}"
          echo "Syncing to $TAG (version $VER)"

          sed -i "s/project(strong-types VERSION [0-9.]*)/project(strong-types VERSION ${VER})/" CMakeLists.txt
          sed -i "s/GIT_TAG v[0-9.]*/GIT_TAG ${TAG}/" README.md

          echo "CMakeLists.txt version:"
          grep -oP 'VERSION \K[0-9.]+' CMakeLists.txt
          echo "README GIT_TAG:"
          grep -oP 'GIT_TAG \K\S+' README.md

      - name: Commit and push
        run: |
          TAG="${{ github.event.release.tag_name }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CMakeLists.txt README.md
          git diff --cached --quiet && echo "Already in sync" && exit 0
          git commit -m "chore: sync version to ${TAG} [skip ci]"
          git push
