name: Fuzz

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions: read-all

jobs:
  fuzz:
    runs-on: ubuntu-24.04
    name: "Clang 18 / libFuzzer"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install libc++
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libc++-18-dev libc++abi-18-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_FUZZING=ON -DFUZZ_USE_LIBCXX=ON
        env:
          CC: clang-18
          CXX: clang++-18

      - name: Build
        run: cmake --build build

      - name: Fuzz safe_math (30s)
        run: |
          mkdir -p corpus/safe_math
          ./build/fuzz_safe_math corpus/safe_math -max_total_time=30

      - name: Fuzz quantity_point (30s)
        run: |
          mkdir -p corpus/quantity_point
          ./build/fuzz_quantity_point corpus/quantity_point -max_total_time=30

      - name: Upload corpus
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: fuzz-corpus
          path: corpus/
